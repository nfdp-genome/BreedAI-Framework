# BreedAI Run Configuration Template
# Copy this file and edit for your specific run.
# See docs/how_to_use_breedai.md for details.

species: cattle
breeding_goal: growth          # growth | milk | dual_purpose | custom
input_type: genotype           # genotype | fastq | vcf | plink

dataset:
  source: vandenberg_QTL300_rg8
  geno_file: dataset/input/Geno.csv
  pheno_file: dataset/input/Pheno.csv
  pedigree_file: ""            # optional; set to .csv path if available
  metadata_file: ""            # optional; breed/sex/herd metadata

mode: default_plus_rnd         # default | default_plus_rnd

qc:
  min_sample_callrate: 0.95
  min_snp_callrate: 0.98
  min_maf: 0.01
  min_variance: 0.0001
  enable_hwe: false
  hwe_p: 1.0e-6

imputation:
  enabled: false
  method: beagle               # beagle | minimac4

grm:
  method: vanRaden             # vanRaden | centered | scaled

cv:
  n_folds: 5
  test_size: 0.20
  val_size: 0.20
  random_state: 42

models:
  default:
    - GBLUP                    # always included
  ssgblup_if_pedigree: true    # add ssGBLUP when pedigree exists
  rnd:
    - GBLUP_Ridge
    - LASSO
    - ElasticNet
    - BayesianRidge
    - RandomForest
    - SVR_RBF
    - NeuralNet_MLP
    - BayesA
    - BayesB
    - BayesCpi
    - XGBoost
    - LightGBM
    - GP_RBF

ensemble:
  simple_average: true
  median: true
  weighted_average: true
  stacking_nonneg_ridge: true
  stack_outer_splits: 5
  stack_inner_splits: 3
  stack_alpha: 1.0

selection_index:
  enabled: false
  weights: {}                  # trait_name: economic_weight

monitoring:
  enabled: false
  baseline_run: ""             # path to a previous run for drift comparison

# FASTQ-path settings (only used when input_type == fastq)
fastq:
  reference_genome: ""
  aligner: bwa-mem2
  caller: gatk_gvcf_joint
  known_sites_vcf: ""

slurm:
  partition: batch
  account: YOUR_SLURM_ACCOUNT
  mem: 64G
  cpus_per_task: 32
  time: "14-00:00:00"
