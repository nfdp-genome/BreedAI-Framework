reference_build: "REQUIRED_REFERENCE_BUILD"

step3:
  caller: gatk_gvcf_joint

step4:
  min_sample_callrate: 0.95
  min_snp_callrate: 0.98
  min_maf: 0.01
  enable_hwe: false
  hwe_p: 1.0e-6
  het_outlier_method: MAD
  het_outlier_thresh: 3.5

step5:
  enabled: true
  method: beagle

modeling:
  default_model: gblup
  enable_ssgblup_if_pedigree: true
  cv_mode_default: forward_time
  rnd_enabled_by_default: false

rnd:
  suite: existing_breedai_18_models_plus_ensembles
  stacking: optional_nested_oof
